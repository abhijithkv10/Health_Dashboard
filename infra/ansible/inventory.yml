all:
  hosts:
    dashboard:
      ansible_host: 127.0.0.1  # Replace with EC2 public IP
      ansible_user: ubuntu
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
  vars:
    project_name: "aws-monitor"
    repo_url: "https://github.com/abhijithkv10/Health_Dashboard.git"
    app_dir: "/home/ubuntu/aws-monitor"

    db_host: "your-rds-endpoint.rds.amazonaws.com"
    db_name: "aws_monitor"
    db_username: "monitor_app"
    db_password: "CHANGE_ME"

    monitor_api_key: "CHANGE_ME"
    jwt_secret: "CHANGE_ME_TO_A_RANDOM_SECRET_32CHARS"
    google_client_id: "your-client-id.apps.googleusercontent.com"
    google_allowed_domain: "yourcompany.com"

    aws_region: "us-east-1"
    sns_topic_arn: "arn:aws:sns:us-east-1:123456789012:monitor-alerts"
