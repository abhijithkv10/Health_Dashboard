---
- name: Install Docker
  become: yes
  dnf:
    name:
      - docker
      - docker-compose-plugin
      - git
      - postgresql15
    state: present

- name: Start and enable Docker
  become: yes
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add ec2-user to docker group
  become: yes
  user:
    name: ec2-user
    groups: docker
    append: yes

- name: Clone application repo
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main
    force: yes
  become_user: ec2-user
  register: repo_clone

- name: Write .env file
  become: yes
  copy:
    dest: "{{ app_dir }}/.env"
    owner: ec2-user
    group: ec2-user
    mode: '0600'
    content: |
      DB_CONNECTION=Host={{ db_host }};Database={{ db_name }};Username={{ db_username }};Password={{ db_password }}
      MONITOR_API_KEY={{ monitor_api_key }}
      JWT_SECRET={{ jwt_secret }}
      VITE_GOOGLE_CLIENT_ID={{ google_client_id }}
      GOOGLE_ALLOWED_DOMAIN={{ google_allowed_domain }}
      AWS_REGION={{ aws_region }}
      AWS_SNS_TOPIC_ARN={{ sns_topic_arn }}

- name: Create database
  become: yes
  environment:
    PGPASSWORD: "{{ db_password }}"
  command: >
    psql -h {{ db_host }} -U {{ db_username }} -d postgres -c "CREATE DATABASE {{ db_name }};"
  ignore_errors: yes

- name: Build and start containers
  become: yes
  docker_compose:
    project_src: "{{ app_dir }}"
    state: present
    restarted: yes
  environment:
    DB_CONNECTION: "Host={{ db_host }};Database={{ db_name }};Username={{ db_username }};Password={{ db_password }}"
    MONITOR_API_KEY: "{{ monitor_api_key }}"
    JWT_SECRET: "{{ jwt_secret }}"
    VITE_GOOGLE_CLIENT_ID: "{{ google_client_id }}"
    GOOGLE_ALLOWED_DOMAIN: "{{ google_allowed_domain }}"
    AWS_REGION: "{{ aws_region }}"
    AWS_SNS_TOPIC_ARN: "{{ sns_topic_arn }}"
