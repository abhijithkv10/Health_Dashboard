services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    network_mode: host
    environment:
      DOTNET_SYSTEM_NET_INET_IPV4_DISABLE: "0"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Host=postgres;Database=aws_monitor;Username=postgres;Password=postgres;SSL Mode=Require}
      Auth__ApiKey: ${MONITOR_API_KEY:-dev-api-key}
      Auth__JwtSecret: ${JWT_SECRET:-dev-jwt-secret-at-least-32-characters!!}
      Auth__Admin__Username: ${ADMIN_USERNAME:-admin}
      Auth__Admin__Password: ${ADMIN_PASSWORD:-}
      Aws__Region: ${AWS_REGION:-us-east-1}
      Aws__SnsTopicArn: ${AWS_SNS_TOPIC_ARN:-}

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
